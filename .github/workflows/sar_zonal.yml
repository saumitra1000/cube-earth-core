name: SAR Zonal Extraction
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pystac-client rasterio shapely numpy requests

    - name: Configure git
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Shanker1000/cube-earth-core.git

    - name: Run zonal SAR extraction
      run: python3 extract_sar_zonal.py

    - name: Final commit
      if: always()
      run: |
        git pull --rebase || true
        git add -f sar_zonal_progress/ sar_zonal_features.csv 2>/dev/null || true
        git diff --staged --quiet || (git commit -m "Zonal SAR final $(date)" && git push)
