<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cube Earth — Field Intelligence</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#F5F7FA;color:#1A2332}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid #E2E8F0;z-index:1000;display:flex;align-items:center;gap:8px;padding:0 12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
#logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#16a34a,#4ade80);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
#logo-text{font-size:15px;font-weight:700;color:#1A2332;white-space:nowrap}
#search-wrap{flex:1;max-width:320px;position:relative}
#search{width:100%;padding:7px 10px 7px 28px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:8px;color:#1A2332;font-size:13px;outline:none}
#search:focus{border-color:#16a34a}
#search::placeholder{color:#94A3B8}
#si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#94A3B8}
.tbtn{padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #E2E8F0;background:#fff;color:#475569;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.tbtn:hover,.tbtn.on{border-color:#16a34a;color:#16a34a;background:#F0FDF4}
#btn-mf{background:#16a34a;border-color:#16a34a;color:#fff;margin-left:auto}
#btn-mf:hover{background:#15803d}
#btn-menu{display:none}

/* LAYOUT */
#app{position:fixed;top:52px;left:0;right:0;bottom:26px;display:flex}

/* SIDEBAR */
#sidebar{width:220px;background:#fff;border-right:1px solid #E2E8F0;overflow-y:auto;padding:12px;flex-shrink:0}
.st{font-size:10px;color:#94A3B8;letter-spacing:1px;text-transform:uppercase;margin:0 0 7px;padding-bottom:4px;border-bottom:1px solid #F1F5F9;font-weight:600}
.ss{margin-bottom:14px}
.li{display:flex;align-items:center;gap:7px;padding:4px 0;cursor:pointer;font-size:13px;color:#475569}
.li input{accent-color:#16a34a}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* MAP */
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#e8f4f0}
.leaflet-control-attribution{background:rgba(255,255,255,0.85)!important;color:#64748B!important;font-size:9px!important}
.leaflet-bar a{background:#fff!important;color:#475569!important;border-color:#E2E8F0!important}
.leaflet-tooltip{background:#fff;border:1px solid #E2E8F0;color:#1A2332;font-size:12px;border-radius:6px;padding:5px 9px;box-shadow:0 2px 8px rgba(0,0,0,.1)}

/* LEGEND */
#legend{position:absolute;top:10px;left:10px;z-index:999;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:9px 11px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.leg-title{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;margin-bottom:3px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* IMAGERY SWITCHER */
#img-sw{position:absolute;bottom:10px;right:10px;z-index:999;background:#fff;border:1.5px solid #E2E8F0;border-radius:9px;padding:8px 10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.img-opt{font-size:11px;color:#64748B;padding:3px 0;cursor:pointer;display:block}
.img-opt.active,.img-opt:hover{color:#16a34a;font-weight:600}
.img-title{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}

/* PANEL */
#panel{width:350px;background:#fff;border-left:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transform:translateX(100%);transition:transform .25s;position:relative}
#panel.open{transform:translateX(0)}
#pclosebtn{position:absolute;top:10px;right:10px;background:none;border:none;color:#94A3B8;cursor:pointer;font-size:18px;z-index:10}
#pscroll{overflow-y:auto;flex:1;padding:14px}
#pload{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:40px}
.spin{width:26px;height:26px;border:2.5px solid #E2E8F0;border-top-color:#16a34a;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* PANEL CONTENT */
.ph{margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #F1F5F9}
.pt{font-size:14px;font-weight:700}
.ps{font-size:11px;color:#94A3B8;margin-top:2px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.sc{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px}
.sc.hl{border-color:#BBF7D0;background:linear-gradient(135deg,#F0FDF4,#DCFCE7);grid-column:1/-1}
.sc.mm{grid-column:1/-1}
.sl{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.sv{font-size:15px;font-weight:700;color:#1A2332}
.ss2{font-size:11px;color:#64748B;margin-top:2px}
.cp{display:inline-flex;align-items:center;gap:3px;background:#DCFCE7;border-radius:4px;padding:2px 6px;font-size:10px;color:#16a34a;font-weight:600;margin-top:4px}
.sth{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin:12px 0 7px;display:flex;align-items:center;gap:6px;font-weight:600}
.sth::after{content:"";flex:1;height:1px;background:#F1F5F9}
.icard{border-radius:10px;overflow:hidden;margin-bottom:8px;border:1.5px solid #E2E8F0}
.ir{display:flex;align-items:center;padding:8px 12px;gap:10px;background:#fff;border-bottom:1px solid #F8FAFC}
.ir:last-child{border-bottom:none}
.ii{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.il{font-size:13px;color:#64748B;flex:1}
.iv{font-size:13px;font-weight:600}
.iv.g{color:#16a34a}.iv.w{color:#D97706}.iv.b{color:#DC2626}.iv.n{color:#475569}
.tl{display:flex;align-items:flex-start;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.ti{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;min-width:44px;position:relative}
.ti::before{content:"";position:absolute;top:11px;left:50%;width:100%;height:2px;background:#E2E8F0;z-index:0}
.ti:last-child::before{display:none}
.td{width:22px;height:22px;border-radius:50%;border:2px solid #E2E8F0;background:#fff;z-index:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:#94A3B8;flex-shrink:0}
.td.done{background:#16a34a;border-color:#16a34a;color:#fff}
.td.cur{background:#16a34a;border-color:#16a34a;color:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.2)}
.tlab{font-size:8px;color:#94A3B8;margin-top:3px;text-align:center;max-width:44px;line-height:1.2}
.tlab.cur{color:#16a34a;font-weight:700}
.cw{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:11px;margin-bottom:8px}
.ct{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600}
.cc{position:relative;height:80px}
.wcard{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.wc{background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px;text-align:center}
.wci{font-size:18px;margin-bottom:2px}
.wcl{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;font-weight:600}
.wcv{font-size:13px;font-weight:700;color:#1A2332}
.rc{border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;gap:9px;align-items:flex-start}
.rc.g{background:#F0FDF4;border-left:3px solid #16a34a}
.rc.w{background:#FFFBEB;border-left:3px solid #D97706}
.rc.b{background:#FEF2F2;border-left:3px solid #DC2626}
.rtitle{font-size:12px;font-weight:700;margin-bottom:2px;color:#1A2332}
.rbody{font-size:11px;color:#64748B;line-height:1.5}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ii2{background:#F8FAFC;border-radius:6px;padding:7px 9px}
.ik{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.iv2{font-size:12px;color:#1A2332;margin-top:2px;font-weight:500}

/* STATS BAR */
#stats-bar{position:fixed;bottom:0;left:0;right:0;height:26px;background:#fff;border-top:1px solid #E2E8F0;display:flex;align-items:center;gap:16px;padding:0 14px;font-size:10px;color:#94A3B8;z-index:500}
#stats-bar b{color:#16a34a}

/* MY FIELDS MODAL */
#mf-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:none;align-items:center;justify-content:center}
#mf-modal.open{display:flex}
#mf-box{background:#fff;border-radius:14px;width:min(560px,95vw);max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
#mf-hdr{padding:14px 18px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;justify-content:space-between}
#mf-hdr h2{font-size:14px;font-weight:700}
#mf-close{background:none;border:none;color:#94A3B8;cursor:pointer;font-size:18px}
#mf-grid{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow-y:auto}
.fc{background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:10px;padding:12px;cursor:pointer}
.fc:hover{border-color:#16a34a;background:#F0FDF4}
.fn{font-size:13px;font-weight:700;margin-bottom:4px}
.fco{font-size:12px;color:#16a34a;font-weight:600}
.fm{font-size:10px;color:#94A3B8;margin-top:3px}

/* MOBILE */
@media(max-width:768px){
  #topbar{height:50px;padding:0 8px;gap:5px}
  #logo-text{font-size:13px}
  #search-wrap{max-width:120px}
  #search{font-size:12px;padding:6px 8px 6px 24px}
  .tbtn{padding:5px 7px;font-size:11px}
  #btn-draw{display:none}
  #btn-menu{display:flex!important}
  #app{flex-direction:column;top:50px;bottom:26px}
  #sidebar{
    width:100%;
    max-height:0;
    overflow:hidden;
    border-right:none;
    border-bottom:1px solid #E2E8F0;
    transition:max-height .3s;
    padding:0;
    flex-shrink:0
  }
  #sidebar.open{max-height:55vh;padding:10px;overflow-y:auto}
  #map-wrap{flex:1;min-height:0;position:relative}
  #panel{
    position:fixed!important;
    width:100%!important;
    height:68vh!important;
    bottom:26px!important;
    left:0!important;
    right:0!important;
    top:auto!important;
    transform:translateY(100%)!important;
    border-left:none!important;
    border-top:2px solid #16a34a!important;
    border-radius:16px 16px 0 0!important;
    z-index:800!important
  }
  #panel.open{transform:translateY(0)!important}
  #legend{display:none}
  #img-sw{display:none}
  #stats-bar{font-size:9px;gap:8px;padding:0 8px}
  .cg{grid-template-columns:1fr 1fr}
  .mf-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="topbar">
  <div id="logo">
    <div id="logo-icon">🛰️</div>
    <span id="logo-text">Cube Earth</span>
  </div>
  <div id="search-wrap">
    <span id="si">🔍</span>
    <input id="search" placeholder="Search parcel ID or lat,lng...">
  </div>
  <button class="tbtn" id="btn-menu" onclick="toggleSidebar()">☰</button>
  <button class="tbtn" id="btn-draw" onclick="toggleDraw()">✏️ Draw</button>
  <button class="tbtn" onclick="locateMe()">📍 Locate</button>
  <button class="tbtn" id="btn-mf" onclick="openMF()">📋 My Fields</button>
</div>

<div id="app">
  <div id="sidebar">
    <div class="ss">
      <div class="st">Layers</div>
      <label class="li"><input type="checkbox" checked onchange="toggleSat(this.checked)"><div class="ld" style="background:#16a34a"></div>Satellite</label>
      <label class="li"><input type="checkbox" checked onchange="toggleParcels(this.checked)"><div class="ld" style="background:#D97706"></div>Parcel Boundaries</label>
      <label class="li"><input type="checkbox" checked onchange="toggleCropFill(this.checked)"><div class="ld" style="background:#4ade80"></div>Crop Prediction</label>
      <label class="li"><input type="checkbox" id="l-ireland" onchange="toggleIreland(this.checked)"><div class="ld" style="background:#3B82F6"></div>All Ireland Tillage</label>
    </div>
    <div class="ss">
      <div class="st">Crop Filter</div>
      <div id="crop-filter"></div>
    </div>
    <div class="ss">
      <div class="st">Summary</div>
      <div style="font-size:12px;color:#64748B;line-height:2">
        <div>🌾 Parcels: <b style="color:#16a34a" id="total-count">0</b></div>
        <div>📡 Updated: <b style="color:#16a34a">Today</b></div>
        <div>🎯 Accuracy: <b style="color:#16a34a">76%</b></div>
        <div>📅 Data: <b style="color:#16a34a">LPIS 2024</b></div>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="legend"></div>
    <div id="img-sw">
      <div class="img-title">Imagery</div>
      <span class="img-opt active" onclick="switchImg('esri',this)">🗺️ Esri Satellite</span>
      <span class="img-opt" onclick="switchImg('sentinel',this)">🛰️ Sentinel-2 2024</span>
      <span class="img-opt" onclick="switchImg('osm',this)">🗺️ OpenStreetMap</span>
    </div>
  </div>

  <div id="panel">
    <button id="pclosebtn" onclick="closePanel()">✕</button>
    <div id="pload"><div class="spin"></div><p style="font-size:12px;color:#64748B">Analysing field...</p></div>
    <div id="pscroll" style="display:none"></div>
  </div>
</div>

<div id="stats-bar">
  Cube Earth · Ireland LPIS 2024 · Sentinel-2 HLS ·
  Accuracy: <b>76%</b> &nbsp;·&nbsp;
  Parcels: <b id="sb-count">0</b>
</div>

<div id="mf-modal">
  <div id="mf-box">
    <div id="mf-hdr"><h2>📋 My Fields</h2><button id="mf-close" onclick="closeMF()">✕</button></div>
    <div id="mf-grid"></div>
  </div>
</div>

// ── PARCELS ──
const parcelGroup=L.layerGroup().addTo(map);
const layers={};
let activePid=null,showFill=true,chart1=null,chart2=null;

const normalStyle=pid=>({color:CROP_COLORS[RAW[pid]?.crop]||"#D97706",weight:3,fillOpacity:showFill?0.1:0,fillColor:CROP_COLORS[RAW[pid]?.crop]||"#4A7A50"});
const selectedStyle=pid=>({color:"#16a34a",weight:4,fillOpacity:0.2,fillColor:CROP_COLORS[RAW[pid]?.crop]||"#16a34a"});

fetch("parcels.geojson")
  .then(r=>r.json())
  .then(gj=>{
    L.geoJSON(gj,{
      style:f=>{const p=RAW[f.properties.pid]||{};return{color:CROP_COLORS[p.crop]||"#D97706",weight:3,fillOpacity:showFill?0.1:0,fillColor:CROP_COLORS[p.crop]||"#4A7A50"};},
      onEachFeature:(f,layer)=>{
        const pid=f.properties.pid,p=RAW[pid]||{};
        layer.bindTooltip("<b>"+(p.crop||f.properties.crop)+"</b><br>"+(p.area||f.properties.area)+" ha · "+(p.conf||f.properties.conf)+"% confidence",{sticky:true});
        layer.on("click",()=>selectParcel(pid));
        layers[pid]=layer;
      }
    }).addTo(parcelGroup);
  })
  .catch(()=>{
    Object.entries(RAW).forEach(([pid,p])=>{
      const r=0.002+(p.area||2)/800;
      const pts=Array.from({length:7},(_,i)=>{const a=(i/7)*2*Math.PI+parseInt(pid)*.7;return[p.lat+r*.7*Math.sin(a),p.lng+r*Math.cos(a)];});
      const poly=L.polygon(pts,{color:CROP_COLORS[p.crop]||"#D97706",weight:3,fillOpacity:showFill?0.1:0,fillColor:CROP_COLORS[p.crop]||"#4A7A50"})
        .bindTooltip("<b>"+p.crop+"</b><br>"+p.area+" ha",{sticky:true})
        .on("click",()=>selectParcel(pid));
      parcelGroup.addLayer(poly);layers[pid]=poly;
    });
  });

document.getElementById("total-count").textContent=Object.keys(RAW).length;

// Crop filter
document.getElementById("crop-filter").innerHTML=crops.map(c=>'<label class="li"><input type="checkbox" checked onchange="filterCrop(\''+c+'\',this.parentElement)"><div class="ld" style="background:'+(CROP_COLORS[c]||"#64748B")+'"></div>'+c+'</label>').join("");

function filterCrop(crop,el){
  const on=el.querySelector("input").checked;
  Object.entries(RAW).forEach(([pid,p])=>{
    if(p.crop===crop && layers[pid]){
      try{
        if(on){parcelGroup.addLayer(layers[pid]);}
        else{parcelGroup.removeLayer(layers[pid]);}
      }catch(e){}
    }
  });
}

var irelandLayer=null,irelandLoaded=false;
function toggleIreland(on){
  if(on&&!irelandLoaded){
    irelandLoaded=true;
    var lbl=document.createElement("div");
    lbl.id="irl-load";lbl.style.cssText="position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;border:1px solid #E2E8F0;box-shadow:0 2px 8px rgba(0,0,0,.1)";
    lbl.textContent="Loading Ireland tillage data...";document.body.appendChild(lbl);
    const IC={"Barley - Spring":"#D97706","Barley - Winter":"#92400E","Wheat - Winter":"#78350F","Wheat - Spring":"#CA8A04","Oats - Spring":"#65A30D","Oats - Winter":"#3F6212","Maize":"#16A34A","Oilseed Rape":"#EAB308","Rye":"#B45309"};
    fetch("ireland_tillage.geojson").then(r=>r.json()).then(gj=>{
      var el=document.getElementById("irl-load");if(el)el.remove();
      irelandLayer=L.geoJSON(gj,{style:f=>({color:IC[f.properties.crop]||"#64748B",weight:1.5,fillOpacity:0.35,fillColor:IC[f.properties.crop]||"#64748B"}),onEachFeature:(f,layer)=>{layer.bindTooltip("<b>"+f.properties.crop+"</b><br>"+f.properties.area+" ha",{sticky:true});}}).addTo(map);var cb=document.getElementById("l-ireland");if(cb)cb.checked=true;
      document.getElementById("total-count").textContent="61,866";document.getElementById("sb-count").textContent="61,866 (All Ireland)";
      document.getElementById("sb-count").textContent="61,866";
    }).catch(()=>{var el=document.getElementById("irl-load");if(el)el.remove();});
  }else if(!on&&irelandLayer){map.removeLayer(irelandLayer);document.getElementById("total-count").textContent=Object.keys(RAW).length;document.getElementById("sb-count").textContent=Object.keys(RAW).length;}
  else if(on&&irelandLayer){map.addLayer(irelandLayer);}
}

// Select parcel
function selectParcel(pid){
  if(activePid&&layers[activePid]){const pp=RAW[activePid]||{};layers[activePid].setStyle({color:CROP_COLORS[pp.crop]||"#D97706",weight:3,fillOpacity:showFill?0.1:0,fillColor:CROP_COLORS[pp.crop]||"#4A7A50"});}
  activePid=pid;
  if(layers[pid])layers[pid].setStyle(selectedStyle(pid));
  openPanel(RAW[pid],pid);
}

// Panel
function openPanel(p,pid){
  const panel=document.getElementById("panel");
  panel.classList.add("open");
  document.getElementById("pload").style.display="flex";
  document.getElementById("pscroll").style.display="none";
  setTimeout(()=>{renderPanel(p,pid);setTimeout(()=>fetchWeather(p.lat,p.lng),200);},900);
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  if(activePid&&layers[activePid]){const pp=RAW[activePid]||{};layers[activePid].setStyle({color:CROP_COLORS[pp.crop]||"#D97706",weight:3,fillOpacity:showFill?0.1:0,fillColor:CROP_COLORS[pp.crop]||"#4A7A50"});activePid=null;}
}

function renderPanel(p,pid){
  document.getElementById("pload").style.display="none";
  const sc=document.getElementById("pscroll");
  sc.style.display="block";
  const ndvi=NDVI_PROFILES[p.crop]||NDVI_PROFILES["Spring Barley"];
  const stages=STAGES[p.crop]||STAGES["Spring Barley"];
  const si=getStageIdx(p.crop);
  const ndviNow=ndvi[month];
  const harvestCrops=["OSR","Winter Barley","Winter Wheat","Winter Oats"];
  const atHarvest=si>=5;
  const cond=(harvestCrops.includes(p.crop)&&atHarvest)?(ndviNow<.35?"Ready to Harvest":"Ripening"):(ndviNow>.7?"Excellent":ndviNow>.55?"Good":ndviNow>.4?"Fair":"Poor");
  const condCls=cond==="Excellent"||cond==="Good"||cond==="Ready to Harvest"?"g":cond==="Fair"||cond==="Ripening"?"w":"b";
  const moisture=[5,4,6,7,6,5,4,4,5,6,7,6][month]>5?"High":ndviNow>.5?"Adequate":"Low";
  const traffic=moisture==="High"?"Fair":"Good";
  const wx=MONTHLY_WX[month];

  const recs=[];
  if(p.match===false&&p.conf>=60)recs.push({t:"b",icon:"🔴",h:"High confidence mismatch with LPIS",b:"Satellite strongly suggests "+p.crop+" but farmer declared "+p.lpis+". This parcel may warrant ground inspection."});
  else if(p.match===false&&p.conf>=40)recs.push({t:"w",icon:"🟡",h:"Possible mismatch with LPIS",b:"Satellite indicates "+p.crop+" but LPIS shows "+p.lpis+". Could be model uncertainty or incorrect declaration."});
  if(p.conf<40)recs.push({t:"b",icon:"🔴",h:"Low confidence — "+p.conf+"%",b:"Model confidence is low. Ambiguous spectral signature. Ground truth verification recommended."});
  else if(p.conf<55)recs.push({t:"w",icon:"🟡",h:"Moderate confidence — "+p.conf+"%",b:"Prediction may be uncertain. Could be mixed cropping or atypical growth pattern."});
  if(cond==="Excellent"||cond==="Good")recs.push({t:"g",icon:"🟢",h:"Healthy crop",b:"Vegetation indices indicate good canopy development. No signs of stress detected from satellite data."});
  if(moisture==="High")recs.push({t:"w",icon:"🟡",h:"High soil moisture",b:"Elevated soil moisture. Avoid heavy machinery. Monitor drainage to prevent waterlogging and compaction."});
  if(si>=4&&si<6)recs.push({t:"w",icon:"🟡",h:"Harvest window approaching",b:p.crop+" is approaching harvest. Monitor grain/seed moisture. Estimated window: "+(HARVEST[p.crop]||"Aug–Sep")+"."});
  if(si>=6)recs.push({t:"w",icon:"🟡",h:"Ready to harvest",b:"Crop is at or near harvest stage. Plan logistics and check weather window."});
  recs.push({t:"g",icon:"🟢",h:"Next satellite pass",b:"Sentinel-2 revisit in ~4 days. Updated NDVI and vegetation maps will be available."});

  const stHTML=stages.map((s,i)=>'<div class="ti"><div class="td '+(i<si?"done":i===si?"cur":"")+(i===si?" cur":"")+'">'+(i<si?"✓":i===si?"▶":"")+'</div><div class="tlab '+(i===si?"cur":"")+'">'+(s)+'</div></div>').join("");

  const matchCard=p.lpis?'<div class="sc mm" style="background:'+(p.match===false?"#FEF2F2":"#F0FDF4")+';border-color:'+(p.match===false?"#FECACA":"#BBF7D0")+'">'+'<div class="sl">LPIS Declaration (Farmer)</div>'+'<div style="display:flex;align-items:center;justify-content:space-between">'+'<div><div class="sv" style="font-size:14px">'+(CROP_ICONS[p.lpis]||"🌾")+" "+p.lpis+'</div>'+'<div style="font-size:12px;margin-top:4px;font-weight:600;color:'+(p.match===false?"#DC2626":"#16a34a")+'">'+(p.match===false?"⚠️ Mismatch with satellite data":"✅ Matches satellite detection")+'</div></div>'+'<div style="font-size:26px">'+(p.match===false?"⚠️":"✅")+'</div></div></div>':'';

  sc.innerHTML='<button onclick="closePanel()" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#94A3B8;cursor:pointer;font-size:18px;z-index:10">✕</button>'
    +'<div class="ph"><div class="pt">📍 Parcel '+pid+'</div><div class="ps">'+today+' · LPIS 2024</div></div>'
    +'<div class="cg">'
    +'<div class="sc hl"><div class="sl">Satellite Detection</div><div style="display:flex;align-items:center;justify-content:space-between"><div><div class="sv">'+(CROP_ICONS[p.crop]||"🌾")+" "+p.crop+'</div><div class="cp">🎯 '+p.conf+'% confidence</div></div><div style="font-size:38px">'+(CROP_ICONS[p.crop]||"🌾")+'</div></div></div>'
    +matchCard
    +'<div class="sc"><div class="sl">Growth Stage</div><div class="sv" style="font-size:14px">'+stages[si]+'</div><div class="ss2">Stage '+(si+1)+"/"+stages.length+'</div></div>'
    +'<div class="sc"><div class="sl">Condition</div><div class="sv iv '+condCls+'" style="font-size:14px">'+cond+'</div><div class="ss2">'+(ndviNow>.6?"Dense canopy":"Developing canopy")+'</div></div>'
    +'<div class="sc"><div class="sl">Harvest Window</div><div class="sv" style="font-size:13px">'+(HARVEST[p.crop]||"Aug–Sep")+'</div><div class="ss2">±3 days confidence</div></div>'
    +'<div class="sc"><div class="sl">Field Area</div><div class="sv">'+p.area+' ha</div><div class="ss2">~'+Math.round(p.area*2.47)+' acres</div></div>'
    +'</div>'
    +'<div class="sth">Growth Timeline</div><div class="tl">'+stHTML+'</div>'
    +'<div class="sth">Satellite Observations</div>'
    +'<div class="icard">'
    +'<div class="ir"><span class="ii">🌿</span><span class="il">NDVI (Vegetation)</span><span class="iv '+(ndviNow>.6?"g":ndviNow>.4?"w":"b")+'">'+ndviNow.toFixed(2)+'</span></div>'
    +'<div class="ir"><span class="ii">💧</span><span class="il">Soil Moisture</span><span class="iv '+(moisture==="Adequate"?"g":moisture==="High"?"w":"b")+'">'+moisture+'</span></div>'
    +'<div class="ir"><span class="ii">🚜</span><span class="il">Trafficability</span><span class="iv '+(traffic==="Good"?"g":"w")+'">'+traffic+'</span></div>'
    +'<div class="ir"><span class="ii">☁️</span><span class="il">Cloud cover (7d)</span><span class="iv n">~45%</span></div>'
    +'</div>'
    +'<div class="sth">NDVI History 2025</div>'
    +'<div class="cw"><div class="cc"><canvas id="c1"></canvas></div></div>'
    +'<div class="sth">Weather Forecast (7 days)</div>'
    +'<div class="wcard"><div class="wc"><div class="wci">🌧</div><div class="wcl">Rain</div><div class="wcv" id="wx-rain">'+wx.rain+' mm</div></div>'
    +'<div class="wc"><div class="wci">🌡</div><div class="wcl">Temp</div><div class="wcv" id="wx-temp">'+wx.tmin+'–'+wx.tmax+'°C</div></div>'
    +'<div class="wc"><div class="wci">💨</div><div class="wcl">Wind</div><div class="wcv" id="wx-wind">'+wx.wind+' km/h</div></div></div>'
    +'<div class="cw"><div class="ct">Daily Forecast</div><div class="cc"><canvas id="c2"></canvas></div></div>'
    +'<div class="sth">AI Recommendations</div>'
    +recs.map(r=>'<div class="rc '+r.t+'"><div style="font-size:18px;flex-shrink:0">'+r.icon+'</div><div><div class="rtitle">'+r.h+'</div><div class="rbody">'+r.b+'</div></div></div>').join("")
    +'<div class="sth">Parcel Information</div>'
    +'<div class="ig">'
    +'<div class="ii2"><div class="ik">Area</div><div class="iv2">'+p.area+' ha</div></div>'
    +'<div class="ii2"><div class="ik">Acres</div><div class="iv2">~'+Math.round(p.area*2.47)+'</div></div>'
    +'<div class="ii2"><div class="ik">Centroid Lat</div><div class="iv2">'+p.lat.toFixed(4)+'°</div></div>'
    +'<div class="ii2"><div class="ik">Centroid Lng</div><div class="iv2">'+p.lng.toFixed(4)+'°</div></div>'
    +'<div class="ii2"><div class="ik">Parcel ID</div><div class="iv2">'+pid+'</div></div>'
    +'<div class="ii2"><div class="ik">Source</div><div class="iv2">LPIS 2024</div></div>'
    +'</div><div style="height:30px"></div>';

  requestAnimationFrame(()=>{
    if(chart1){chart1.destroy();chart1=null;}
    if(chart2){chart2.destroy();chart2=null;}
    const gc={color:"#F1F5F9"},tc={color:"#94A3B8",font:{size:9}};
    chart1=new Chart(document.getElementById("c1"),{type:"line",data:{labels:mLbl,datasets:[{data:ndvi,borderColor:"#16a34a",backgroundColor:"#16a34a18",borderWidth:2,pointRadius:mLbl.map((_,i)=>i===month?5:2),pointBackgroundColor:mLbl.map((_,i)=>i===month?"#16a34a":"#86EFAC"),tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc.color},ticks:tc},y:{grid:{color:gc.color},ticks:tc,min:0,max:1}}}});
    chart2=new Chart(document.getElementById("c2"),{type:"bar",data:{labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],datasets:[{label:"Rain mm",data:[0,2,8,12,4,0,1],backgroundColor:"#3B82F630",borderColor:"#3B82F6",borderWidth:1,yAxisID:"y"},{label:"Temp °C",data:[wx.tmin+2,wx.tmin,wx.tmin-1,wx.tmin+1,wx.tmax-2,wx.tmax,wx.tmax-1],type:"line",borderColor:"#D97706",pointRadius:3,borderWidth:2,tension:.4,yAxisID:"y1"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc.color},ticks:tc},y:{grid:{color:gc.color},ticks:tc,position:"left"},y1:{grid:{display:false},ticks:{color:"#D97706",font:{size:9}},position:"right"}}}});
  });
}

// Weather API
function fetchWeather(lat,lng){
  var xhr=new XMLHttpRequest();
  xhr.open("GET","https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&daily=rain_sum,temperature_2m_max,temperature_2m_min,wind_speed_10m_max&forecast_days=7&timezone=UTC",true);
  xhr.onload=function(){
    try{
      var d=JSON.parse(xhr.responseText).daily;
      var rain=d.rain_sum.reduce(function(a,b){return a+(b||0);},0).toFixed(0);
      var tmax=Math.max.apply(null,d.temperature_2m_max).toFixed(0);
      var tmin=Math.min.apply(null,d.temperature_2m_min).toFixed(0);
      var wind=Math.round(d.wind_speed_10m_max.reduce(function(a,b){return a+(b||0);},0)/7);
      var r=document.getElementById("wx-rain");if(r)r.textContent=rain+" mm";
      var t=document.getElementById("wx-temp");if(t)t.textContent=tmin+"\u2013"+tmax+"\u00b0C";
      var w=document.getElementById("wx-wind");if(w)w.textContent=wind+" km/h";
    }catch(e){}
  };
  xhr.send();
}

// Layer toggles
function toggleSat(on){on?map.addLayer(activeImg):map.removeLayer(activeImg);}
function toggleParcels(on){Object.values(layers).forEach(l=>l.setStyle({opacity:on?1:0,fillOpacity:on&&showFill?.1:0}));}
function toggleCropFill(on){showFill=on;Object.entries(layers).forEach(([pid,l])=>{if(pid!==activePid)l.setStyle({fillOpacity:on?.1:0});});}

// Draw
const drawn=L.featureGroup().addTo(map);
function toggleDraw(){
  var btn=document.getElementById("btn-draw");
  btn.classList.toggle("on");
  var d=new L.Draw.Polygon(map,{shapeOptions:{color:"#16a34a",weight:2,fillOpacity:.15}});
  d.enable();
  map.once(L.Draw.Event.CREATED,function(e){
    drawn.addLayer(e.layer);
    btn.classList.remove("on");
    var c=e.layer.getBounds().getCenter();
    var near=Object.entries(RAW).reduce(function(a,b){var d=Math.hypot(b[1].lat-c.lat,b[1].lng-c.lng);return d<a[1]?[b[0],d]:a;},["",Infinity]);
    if(near[0])selectParcel(near[0]);
  });
}

// Sidebar toggle (mobile)
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}

// Locate
function locateMe(){navigator.geolocation.getCurrentPosition(function(p){map.setView([p.coords.latitude,p.coords.longitude],15);},function(){alert("Location access denied");});}

// Search
document.getElementById("search").addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;
  var q=e.target.value.trim();
  var nums=q.split(/[,\s]+/).map(Number).filter(function(n){return!isNaN(n);});
  if(nums.length>=2){map.setView([nums[0],nums[1]],15);return;}
  var found=Object.entries(RAW).find(function(x){return x[0]===q;});
  if(found){map.setView([found[1].lat,found[1].lng],15);selectParcel(found[0]);}
});

// My Fields
function openMF(){
  document.getElementById("mf-grid").innerHTML=Object.entries(RAW).slice(0,20).map(function(x){
    var pid=x[0],p=x[1];
    return '<div class="fc" onclick="goField(\''+pid+'\')"><div class="fn">'+(CROP_ICONS[p.crop]||"🌾")+" Parcel "+pid+'</div><div class="fco">'+p.crop+'</div><div class="fm">'+p.area+' ha · '+p.conf+'% conf</div><div style="font-size:10px;color:'+(p.match===false?"#DC2626":"#16a34a")+';margin-top:4px">'+(p.match===false?"⚠️ LPIS mismatch":"✅ Matches LPIS")+'</div></div>';
  }).join("");
  document.getElementById("mf-modal").classList.add("open");
}
function closeMF(){document.getElementById("mf-modal").classList.remove("open");}
function goField(pid){closeMF();var p=RAW[pid];map.setView([p.lat,p.lng],15);selectParcel(pid);}
</script>
